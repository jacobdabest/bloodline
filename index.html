<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BLOODLINE</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0b0d13;overflow:hidden;font:14px/1.4 system-ui,sans-serif;color:#e6e8f0}
  canvas{display:block}
  #hud{position:fixed;inset:0;pointer-events:none}
  .box{position:absolute;background:rgba(12,14,22,.8);border:1px solid #2c3040;
       border-radius:10px;padding:10px 13px;backdrop-filter:blur(6px)}
  #stats{top:14px;left:14px;min-width:230px}
  #net{top:14px;right:14px;min-width:180px}
  #slots{bottom:14px;left:14px}
  #target{top:100px;left:50%;transform:translateX(-50%);text-align:center;display:none;min-width:260px}
  #feed{bottom:14px;right:14px;width:290px}
  #feed div{padding:2px 0;color:#8b90a5;font-size:13px}
  #feed .good{color:#7ee787}#feed .big{color:#ffd54f;font-weight:700}#feed .bad{color:#ff7b72}
  .pname{font-size:16px;font-weight:700}.dim{color:#8b90a5;font-size:12px}
  .bar{height:6px;background:#232735;border-radius:4px;overflow:hidden;margin:6px 0 3px}
  .bar i{display:block;height:100%}
  .slot{display:inline-block;width:66px;padding:7px 4px;margin-right:5px;text-align:center;
        border:1px solid #2c3040;border-radius:8px;background:rgba(20,23,33,.9);vertical-align:top}
  .slot.on{border-color:#fff;box-shadow:0 0 12px -2px currentColor}
  .slot.fus{border-style:dashed}
  .slot b{display:block;font-size:11px;margin-top:3px}.slot .k{font-size:10px;color:#8b90a5}
  #chan{position:absolute;left:50%;top:63%;transform:translateX(-50%);width:290px;display:none;text-align:center}
  #chan .bar{height:11px}
  #crosshair{position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px 0 0 -2.5px;
             border-radius:50%;background:#fff;opacity:.6}
  #flash{position:absolute;inset:0;background:#fff;opacity:0}
  #start{position:fixed;inset:0;display:grid;place-content:center;text-align:center;
         background:rgba(8,9,14,.96);z-index:9;gap:9px;padding:20px}
  #start h1{font-size:36px;letter-spacing:9px}
  #start p{color:#8b90a5}
  kbd{background:#232735;border:1px solid #363b4d;border-radius:4px;padding:1px 6px;font-size:12px}
  .btn{background:#6c7dff;color:#fff;border:0;font:inherit;font-weight:600;
       padding:10px 22px;border-radius:8px;cursor:pointer;margin:3px}
  .btn.ghost{background:#232735}.btn:hover{filter:brightness(1.15)}
  input{background:#232735;border:1px solid #363b4d;color:#e6e8f0;padding:10px 12px;border-radius:8px;
        font:inherit;text-align:center;letter-spacing:3px;text-transform:uppercase;width:150px}
  #roomcode{font-size:26px;letter-spacing:8px;color:#7ee787;background:#000;padding:8px 16px;
            border-radius:8px;display:inline-block;user-select:all}
</style>
</head>
<body>

<div id="start">
  <h1>BLOODLINE</h1>
  <p>ONE FOR ALL — take it, stack it, fuse it, pass it on</p>
  <div id="menu" style="margin-top:18px">
    <button class="btn" id="bSolo">Play solo</button>
    <button class="btn ghost" id="bHost">Host a world</button>
    <div style="margin-top:12px">
      <input id="iJoin" placeholder="CODE" maxlength="6">
      <button class="btn ghost" id="bJoin">Join</button>
    </div>
  </div>
  <div id="lobby" style="display:none;margin-top:18px">
    <p>share this code with your friend</p>
    <div id="roomcode">------</div>
    <p id="lobbyinfo" class="dim" style="margin-top:10px">waiting...</p>
    <button class="btn" id="bEnter" style="margin-top:12px">Enter the world</button>
  </div>
  <p style="margin-top:22px"><kbd>WASD</kbd> move &nbsp;<kbd>shift</kbd> sprint &nbsp;<kbd>space</kbd> jump</p>
  <p><kbd>click</kbd> fire &nbsp;<kbd>hold E</kbd> take &nbsp;<kbd>hold G</kbd> give &nbsp;<kbd>C</kbd> fuse &nbsp;<kbd>1-6</kbd> swap</p>
</div>

<div id="hud">
  <div class="box" id="stats"></div><div class="box" id="net"></div>
  <div class="box" id="slots"></div><div class="box" id="target"></div>
  <div class="box" id="feed"></div><div class="box" id="chan"></div>
  <div id="crosshair"></div><div id="flash"></div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from "three";

/* ==================================================================== */
/*  GENES                                                                */
/* ==================================================================== */
const ELEMENTS={Fire:10,Ice:10,Water:9,Earth:9,Wind:9,Metal:8,Lightning:7,Toxin:7,Sound:6,Shadow:5,Light:5,Gravity:3};
const DELIVERIES={Projectile:10,Aura:9,Touch:9,Transform:8,Terrain:7,Summon:5};
const MODIFIERS={Homing:8,Lingering:8,Piercing:8,Chain:7,Splitting:7,Delayed:6,Draining:6,Reflecting:5,Vortex:4,Unstable:4};
const BODY={None:26,"Glowing Eyes":10,Scales:8,Tail:8,Claws:8,Horns:7,Wings:4,"Extra Arms":3,"Translucent Skin":3};
const COLORS={Fire:[0xff4d2d,0xffb03a],Ice:[0x3ec8f5,0xc9f4ff],Water:[0x1f7ae0,0x69c7ff],
  Earth:[0x8a6244,0xc9a27a],Wind:[0x5fbfae,0xd6f5ee],Metal:[0x7c8b99,0xd3dde6],
  Lightning:[0xe8b800,0xfff07a],Toxin:[0x79b83c,0xcdf58a],Sound:[0xa562d6,0xe6c2ff],
  Shadow:[0x4b2d6b,0x8f6bc4],Light:[0xd9c94a,0xfffbd4],Gravity:[0x5b3fd4,0xa690ff]};
const FUSIONS=new Map([["Fire|Ice","Steam"],["Earth|Fire","Magma"],["Fire|Wind","Firestorm"],
  ["Fire|Metal","Forge"],["Fire|Lightning","Plasma"],["Fire|Water","Scald"],["Fire|Light","Solar"],
  ["Fire|Shadow","Emberdark"],["Fire|Sound","Detonation"],["Fire|Toxin","Napalm"],["Fire|Gravity","Starcore"],
  ["Ice|Wind","Blizzard"],["Earth|Ice","Permafrost"],["Ice|Water","Glacier"],["Ice|Metal","Frostiron"],
  ["Ice|Light","Prism"],["Ice|Shadow","Blackfrost"],["Ice|Sound","Shatter"],["Ice|Toxin","Chillblight"],
  ["Gravity|Ice","Comet"],["Ice|Lightning","Thundersnow"],["Lightning|Metal","Magnetism"],
  ["Lightning|Water","Stormsurge"],["Lightning|Wind","Tempest"],["Earth|Lightning","Fulgurite"],
  ["Lightning|Light","Flashfire"],["Lightning|Shadow","Blackbolt"],["Lightning|Sound","Thunderclap"],
  ["Lightning|Toxin","Venomarc"],["Gravity|Lightning","Pulsar"],["Light|Shadow","Eclipse"],
  ["Shadow|Toxin","Blight"],["Light|Sound","Resonance"],["Earth|Gravity","Tectonic"],
  ["Gravity|Light","Singularity"],["Gravity|Shadow","Voidwell"],["Gravity|Metal","Collapse"],
  ["Gravity|Sound","Rift"],["Gravity|Toxin","Corrosion"],["Gravity|Water","Maelstrom"],
  ["Gravity|Wind","Downdraft"],["Toxin|Water","Miasma"],["Earth|Metal","Ironclad"],["Sound|Wind","Howl"],
  ["Earth|Water","Mudflow"],["Earth|Wind","Sandstorm"],["Earth|Shadow","Gravesoil"],["Earth|Sound","Quake"],
  ["Earth|Toxin","Rot"],["Earth|Light","Verdance"],["Metal|Water","Quicksilver"],["Metal|Wind","Shrapnel"],
  ["Metal|Shadow","Blackiron"],["Metal|Sound","Bellring"],["Metal|Toxin","Rust"],["Light|Metal","Mirrorsteel"],
  ["Water|Wind","Riptide"],["Shadow|Water","Deepdark"],["Sound|Water","Sonar"],["Light|Water","Shimmer"],
  ["Shadow|Wind","Whisper"],["Light|Wind","Aurora"],["Toxin|Wind","Spore"],["Light|Toxin","Radiance"],
  ["Shadow|Sound","Dirge"],["Sound|Toxin","Discord"]]);
const UNLOCK_D2=20,UNLOCK_M2=45,UNLOCK_AWAKEN=70,BASE_CAP=75,CAP_GEN=8,MAXLV=100;

const xpFor=lv=>Math.floor(50*Math.pow(lv,1.5));
const fuse=(a,b)=>FUSIONS.get([a,b].sort().join("|"))??`${a}/${b}`;
const hex=n=>"#"+n.toString(16).padStart(6,"0");
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const hashStr=s=>{let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;};
let rng=mulberry32(12345);
function weighted(t,ex=[],r=Math.random){const o=Object.entries(t).filter(([k])=>!ex.includes(k));
  let x=r()*o.reduce((s,[,w])=>s+w,0);for(const[k,w]of o){x-=w;if(x<=0)return k;}return o.at(-1)[0];}

class Power{
  constructor(el,de,mo,body,gen=1){Object.assign(this,{elements:el,deliveries:de,modifiers:mo,
    body,generation:gen,level:1,xp:0,fused:false});}
  get levelCap(){return Math.min(MAXLV,BASE_CAP+CAP_GEN*(this.generation-1));}
  get slots(){return{elements:(this.fused||this.level>=UNLOCK_AWAKEN)?2:1,
    deliveries:(this.fused||this.level>=UNLOCK_D2)?2:1,
    modifiers:(this.fused||this.level>=UNLOCK_M2)?2:1};}
  get actEl(){return this.elements.slice(0,this.slots.elements);}
  get actDe(){return this.deliveries.slice(0,this.slots.deliveries);}
  get actMo(){return this.modifiers.slice(0,this.slots.modifiers);}
  get elementName(){const a=this.actEl;return a.length===1?a[0]:fuse(a[0],a[1]);}
  get colors(){return COLORS[this.actEl[0]];}
  get colors2(){return COLORS[this.actEl[1]??this.actEl[0]];}
  get potency(){return Math.round((10+this.level*1.4+(this.generation-1)*3+(this.fused?8:0))*10)/10;}
  get name(){return `${this.actMo[0]} ${this.elementName} ${this.actDe[0]}`;}
  get maxed(){return this.level>=this.levelCap;}
  addXp(n){const ev=[];if(this.maxed)return ev;this.xp+=n;
    while(this.level<this.levelCap&&this.xp>=xpFor(this.level+1)){
      this.xp-=xpFor(this.level+1);this.level++;
      if(this.level===UNLOCK_D2&&!this.fused)ev.push(`delivery unlocked: ${this.deliveries[1]}`);
      if(this.level===UNLOCK_M2&&!this.fused)ev.push(`modifier unlocked: ${this.modifiers[1]}`);
      if(this.level===UNLOCK_AWAKEN&&!this.fused)ev.push(`AWAKENED — ${this.elements[1]}`);
    }if(this.maxed)this.xp=0;return ev;}
  toJSON(){return{...this};}
  static from(d){const p=new Power(d.elements,d.deliveries,d.modifiers,d.body,d.generation);
    p.level=d.level;p.xp=d.xp;p.fused=!!d.fused;return p;}
}
function rollPower(gen=1,r=Math.random){
  const e1=weighted(ELEMENTS,[],r),e2=weighted(ELEMENTS,[e1],r);
  const d1=weighted(DELIVERIES,[],r),d2=weighted(DELIVERIES,[d1],r);
  const m1=weighted(MODIFIERS,[],r),m2=weighted(MODIFIERS,[m1],r);
  return new Power([e1,e2],[d1,d2],[m1,m2],weighted(BODY,[],r),gen);
}

/* ==================================================================== */
/*  ONE FOR ALL                                                          */
/* ==================================================================== */
const MAX_SLOTS=6,STEAL_BASE=3.2,GIVE_TIME=1.6,OFA_TIME=5.5,REACH=7;

/* ---- combat ---- */
const MOD_DMG={Homing:3,Lingering:3,Piercing:6,Chain:4,Splitting:3,
               Delayed:2,Draining:5,Reflecting:3,Vortex:6,Unstable:8};
const STRONG={Fire:"Ice",Ice:"Toxin",Toxin:"Earth",Earth:"Lightning",Lightning:"Water",
              Water:"Fire",Metal:"Sound",Sound:"Shadow",Shadow:"Light",Light:"Shadow",
              Wind:"Metal",Gravity:"Wind"};
/* per-delivery: cooldown, damage scale, reach.
   Tuned so every style drops an equal opponent in roughly 6-9s.
   Terrain and Summon deal their damage repeatedly, so their per-hit number is low. */
const ATK={
  Projectile:{cd:0.55,dmg:0.42,range:60},   // steady, safe, ranged
  Aura:      {cd:2.60,dmg:1.50,range:9 },   // burst, hits everyone around you
  Touch:     {cd:0.90,dmg:0.75,range:4 },   // best dps, but you have to be in their face
  Transform: {cd:15.0,dmg:0,   range:0 },   // click once to change; then strike while changed
  Strike:    {cd:0.85,dmg:0.95,range:4 },   // the transformed melee — only usable while changed
  Terrain:   {cd:3.80,dmg:0.42,range:26},   // area denial, ticks every 0.85s for 6.5s
  Summon:    {cd:9.00,dmg:0.50,range:34},   // autonomous, fires every 1.1s for 14s
};
const maxHpFor=p=>Math.round(70+p.level*2+(p.generation-1)*8);
function dmgOf(p,mode,targetEls=[]){
  let d=(p.potency*0.34+p.actMo.reduce((s,m)=>s+(MOD_DMG[m]||0),0))*(ATK[mode]?.dmg??1);
  if(p.actEl.some(e=>targetEls.includes(STRONG[e])))d*=1.4;
  return d*(0.88+Math.random()*0.24);
}
/* ofa: only ONE person in a world holds One For All. The host starts with it.
   Without it you have your own power and can give it away — but you cannot
   take, and you cannot fuse. */
const S={held:[],active:0,stolen:0,given:0,fusions:0,name:"You",ofa:true};

function loadSave(){
  let base=null;
  try{const raw=localStorage.getItem("bloodline.save.v1");
      if(raw)base=Power.from(JSON.parse(raw).me.power);}catch{}
  try{const d=JSON.parse(localStorage.getItem("bloodline.ofa.v1"));
      if(d&&d.held?.length){S.held=d.held.map(Power.from);S.active=Math.min(d.active??0,d.held.length-1);
        S.stolen=d.stolen??0;S.given=d.given??0;S.fusions=d.fusions??0;return;}}catch{}
  S.held=[base??rollPower()];
}
const persist=()=>localStorage.setItem("bloodline.ofa.v1",JSON.stringify(
  {held:S.held.map(p=>p.toJSON()),active:S.active,stolen:S.stolen,given:S.given,fusions:S.fusions}));
const active=()=>S.held[S.active];
const stockpile=()=>(S.held.length-1)*4;
const myPotency=()=>Math.round((active().potency+stockpile())*10)/10;
loadSave();

/* combine two held powers into one fused power */
function combine(){
  if(!S.ofa){feed("only One For All can fuse powers together","bad");return;}
  if(S.held.length<2){feed("you need two powers to fuse","bad");return;}
  const i=S.active,j=(S.active+1)%S.held.length;
  const a=S.held[i],b=S.held[j];
  const f=new Power([a.elements[0],b.elements[0]],[a.deliveries[0],b.deliveries[0]],
    [a.modifiers[0],b.modifiers[0]],a.body!=="None"?a.body:b.body,
    Math.max(a.generation,b.generation)+1);
  f.fused=true;
  f.level=Math.max(a.level,b.level);
  S.held=S.held.filter((_,k)=>k!==i&&k!==j);
  S.held.push(f);
  S.active=S.held.length-1;
  S.fusions++;
  feed(`FUSED ${a.elementName} + ${b.elementName} → ${f.elementName}`,"big");
  feed(`all three gene slots open at once · +8 potency · cap ${f.levelCap}`,"good");
  whiteFlash(0.5);shake(1.3);
  impact(player.pos.clone().add(new THREE.Vector3(0,1.4,0)),f.colors[1]);
  impact(player.pos.clone().add(new THREE.Vector3(0,1.4,0)),f.colors2[1]);
  persist();drawHUD();
}

/* ==================================================================== */
/*  NETWORK                                                              */
/* ==================================================================== */
const NET={peer:null,conns:[],isHost:false,room:null,id:null,on:false};
const remotes=new Map();
const shortCode=()=>{const A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return Array.from({length:6},()=>A[Math.floor(Math.random()*A.length)]).join("");};
function netSend(m){if(!NET.on)return;m.from??=NET.id;const s=JSON.stringify(m);
  for(const c of NET.conns)if(c.open)try{c.send(s);}catch{}}
function relay(m,except){if(!NET.isHost)return;const s=JSON.stringify(m);
  for(const c of NET.conns)if(c.open&&c!==except)try{c.send(s);}catch{}}

function hookConn(c){
  NET.conns.push(c);
  c.on("open",()=>{c.send(JSON.stringify({t:"hello",from:NET.id,name:S.name,
    power:active().toJSON(),held:S.held.length}));updateNet();});
  c.on("data",raw=>{let m;try{m=JSON.parse(raw);}catch{return;}relay(m,c);handleNet(m);});
  c.on("close",()=>{NET.conns=NET.conns.filter(x=>x!==c);
    for(const[id,r]of remotes)if(r.conn===c){scene.remove(r.char.group);remotes.delete(id);feed(`${r.name} left`,"bad");}
    updateNet();});
  c.on("error",()=>{});
}
function handleNet(m){
  if(m.from===NET.id)return;
  switch(m.t){
    case"hello":ensureRemote(m.from,m.name,m.power);
      netSend({t:"hello2",from:NET.id,name:S.name,power:active().toJSON(),held:S.held.length});
      feed(`${m.name} joined`,"big");break;
    case"hello2":ensureRemote(m.from,m.name,m.power);break;
    case"state":{const r=ensureRemote(m.from,m.name,m.power);
      r.target.set(m.x,m.y,m.z);r.yaw=m.yaw;r.heldN=m.held;r.moving=m.mv;r.ofa=!!m.ofa;
      if(m.power)r.power=Power.from(m.power);break;}
    case"shot":spawnShot(new THREE.Vector3(m.x,m.y,m.z),new THREE.Vector3(m.dx,m.dy,m.dz),m.c,false);break;
    case"dmg":{if(m.to!==NET.id)break;takeDamage(m.n,m.byName);break;}
    case"aura":{const at=new THREE.Vector3(m.x,m.y+1,m.z);
      const w=new THREE.Mesh(new THREE.SphereGeometry(1,14,10),new THREE.MeshBasicMaterial(
        {color:m.c,transparent:true,opacity:0.5,side:THREE.DoubleSide,depthWrite:false}));
      w.position.copy(at);scene.add(w);fx.push({o:w,life:0.5,max:0.5,kind:"wave",R:m.r});
      impact(at,m.c);break;}
    case"touch":{const at=new THREE.Vector3(m.x,m.y,m.z);
      const sl=new THREE.Mesh(new THREE.TorusGeometry(1.15,0.13,5,14,Math.PI*1.1),
        new THREE.MeshBasicMaterial({color:m.c,transparent:true,depthWrite:false}));
      sl.position.copy(at);sl.lookAt(camera.position);scene.add(sl);
      fx.push({o:sl,life:0.24,max:0.24,kind:"slash"});break;}
    case"terrain":{const at=new THREE.Vector3(m.x,m.y,m.z);
      const disc=new THREE.Mesh(new THREE.CircleGeometry(3.6,20),new THREE.MeshBasicMaterial(
        {color:m.c1,transparent:true,opacity:0.45,depthWrite:false}));
      disc.rotation.x=-Math.PI/2;disc.position.copy(at);scene.add(disc);
      const sp=new THREE.Mesh(new THREE.ConeGeometry(0.9,2.2,6),new THREE.MeshBasicMaterial(
        {color:m.c2,transparent:true,opacity:0.8,depthWrite:false}));
      sp.position.copy(at).add(new THREE.Vector3(0,1.1,0));scene.add(sp);
      hazards.push({disc,spike:sp,pos:at,r:3.6,life:6.5,tick:0,color:m.c1,mine:false});break;}
    case"tf":{const r=remotes.get(m.from);if(r){r.tfT=9;
      impact(r.char.group.position.clone().add(new THREE.Vector3(0,1.1,0)),m.c);}break;}
    case"summon":break;
    case"beam":{const r=remotes.get(m.from);if(!r)break;r.beamP=m.p;r.beamKind=m.kind;break;}
    case"npcTaken":{const n=npcs[m.i];if(n)npcRemove(n,m.el,m.byName);break;}
    case"npcGiven":{const n=npcs[m.i];if(!n)break;n.powers.push(Power.from(m.power));
      refreshNpc(n);feed(`${m.byName} gave ${n.name} a power`);break;}
    case"steal":{if(m.to!==NET.id)break;
      const i=S.held.findIndex(p=>p.elements[0]===m.el&&p.level===m.lv);
      if(i>=0&&S.held.length>1){const lost=S.held.splice(i,1)[0];
        S.active=Math.min(S.active,S.held.length-1);
        feed(`${m.byName} TOOK your ${lost.elementName}!`,"bad");
        shake(1);whiteFlash(0.3);persist();drawHUD();}
      break;}
    case"ofa":{if(m.to!==NET.id)break;
      S.ofa=true;
      feed(`${m.byName} PASSED YOU ONE FOR ALL`,"big");
      feed("you can now take powers (E) and fuse them (C)","good");
      whiteFlash(0.8);shake(2);drawHUD();break;}
    case"give":{if(m.to!==NET.id)break;
      if(S.held.length>=MAX_SLOTS){feed(`${m.byName} tried to give you a power — slots full`,"bad");break;}
      S.held.push(Power.from(m.power));
      feed(`${m.byName} GAVE you ${Power.from(m.power).elementName}`,"big");
      persist();drawHUD();break;}
  }
}
function startNet(mode,code){
  NET.room=mode==="host"?shortCode():code;
  NET.id="p"+Math.random().toString(36).slice(2,8);
  NET.isHost=mode==="host";
  S.ofa=NET.isHost;              // exactly one One For All per world — the host starts holding it
  NET.peer=new Peer(mode==="host"?"bloodline-"+NET.room:"bloodline-"+NET.room+"-"+NET.id,{debug:0});
  NET.peer.on("open",()=>{
    NET.on=true;rng=mulberry32(hashStr(NET.room));
    document.getElementById("menu").style.display="none";
    document.getElementById("lobby").style.display="block";
    document.getElementById("roomcode").textContent=NET.room;
    document.getElementById("lobbyinfo").textContent=
      NET.isHost?"waiting for someone to join...":"connected — enter when ready";
    if(!NET.isHost)hookConn(NET.peer.connect("bloodline-"+NET.room,{reliable:true}));
    buildWorld();
  });
  NET.peer.on("connection",c=>{hookConn(c);
    document.getElementById("lobbyinfo").textContent="someone joined!";});
  NET.peer.on("error",e=>{document.getElementById("lobbyinfo").textContent=
    String(e).includes("unavailable")?"that code is taken — host again":"connection problem: "+e.type;});
}
let fps=0,fpsFrames=0,fpsClock=0;
function updateNet(){
  const el=document.getElementById("net");

/* Render at a fraction of screen resolution and let the browser scale it up.
   On weak integrated graphics this is the single biggest performance lever
   there is — 0.6 scale means about a third of the pixels to shade. */
const QLEVELS={low:0.55,medium:0.75,high:1.0};
let quality=localStorage.getItem("bloodline.q")||"low";
function applyQuality(){
  const sc=QLEVELS[quality]??0.55;
  renderer.setSize(Math.round(innerWidth*sc),Math.round(innerHeight*sc),false);
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  scene.fog.density=quality==="low"?0.0125:quality==="medium"?0.0105:0.0092;
  localStorage.setItem("bloodline.q",quality);
}

  side:THREE.BackSide,depthWrite:false,
  uniforms:{top:{value:new THREE.Color(0x0e1730)},hor:{value:new THREE.Color(0x3d4f74)},
            bot:{value:new THREE.Color(0x090b11)},glow:{value:new THREE.Color(0xffb774)},
            sun:{value:SUNDIR}},
  vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`uniform vec3 top,hor,bot,glow,sun;varying vec3 vP;
    void main(){vec3 d=normalize(vP);float h=d.y;
      vec3 c=h>0.?mix(hor,top,pow(h,0.5)):mix(hor,bot,pow(-h,0.4));
      float s=max(dot(d,normalize(sun)),0.);
      c=mix(c,glow,pow(s,7.)*0.85);                 // broad haze near the sun
      c+=glow*pow(s,220.)*1.6;                      // the disc itself

const SIZE=300,SEG=72,WATER=-6;
/* layered ridges + a bowl in the middle so there's a natural arena,
   and a lake basin off to one side */
function groundH(x,z){
  const d=Math.hypot(x,z);
  let h=Math.sin(x*0.032)*5.5+Math.cos(z*0.028)*4.8          // broad rolling
       +Math.sin((x+z)*0.013)*8.0+Math.cos((x-z)*0.021)*3.4;  // long ridges
  h+=Math.sin(x*0.09)*1.5+Math.cos(z*0.105)*1.3;             // medium bumps
  h+=Math.sin(x*0.31+z*0.27)*0.55;                            // fine detail
  h+=Math.max(0,(d-95))*0.42;                                 // mountains ring the edge
  h-=Math.exp(-((d/26)**2))*7.5;                              // central bowl = arena
  const lx=x+78,lz=z-62;                                      // lake basin
  h-=Math.exp(-((Math.hypot(lx,lz)/30)**2))*13;
  return h;
}

{
  const g=new THREE.PlaneGeometry(SIZE,SIZE,SEG,SEG);g.rotateX(-Math.PI/2);
  const pos=g.attributes.position,col=[];
  const sand=new THREE.Color(0xb5a071),low=new THREE.Color(0x35784b),
        mid=new THREE.Color(0x5c8a52),dry=new THREE.Color(0x7d8558),
        rock=new THREE.Color(0x7c7a80),top=new THREE.Color(0xe8ecf4);
  const slopeAt=(x,z)=>Math.abs(groundH(x+1.6,z)-groundH(x-1.6,z))
                      +Math.abs(groundH(x,z+1.6)-groundH(x,z-1.6));
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),z=pos.getZ(i),y=groundH(x,z);pos.setY(i,y);
    let c;
    if(y<WATER+1.6)c=sand.clone();
    else{
      const t=THREE.MathUtils.clamp((y-WATER)/30,0,1);
      c=t<0.28?low.clone().lerp(mid,t/0.28)
        :t<0.55?mid.clone().lerp(dry,(t-0.28)/0.27)
        :t<0.80?dry.clone().lerp(rock,(t-0.55)/0.25)
        :rock.clone().lerp(top,(t-0.80)/0.20);
      /* steep faces show bare rock regardless of height */
      const s=THREE.MathUtils.clamp(slopeAt(x,z)/5.5,0,1);
      c.lerp(rock,s*0.75);
    }
    c.offsetHSL(0,0,(Math.sin(x*12.9+z*78.2)*0.5)*0.045);
    col.push(c.r,c.g,c.b);
  }
  g.setAttribute("color",new THREE.Float32BufferAttribute(col,3));
  g.computeVertexNormals();
  scene.add(new THREE.Mesh(g,new THREE.MeshLambertMaterial({vertexColors:true,flatShading:true})));
}

const boxG=new THREE.BoxGeometry(1,1,1);
const shadowG=new THREE.CircleGeometry(0.72,14);

function makeChar(skin,cloth,accent){
  const group=new THREE.Group();
  const M=c=>new THREE.MeshLambertMaterial({color:c,flatShading:true});
  const mc=M(cloth),ms=M(skin),ma=M(accent);

  const torso=new THREE.Mesh(boxG,mc);torso.scale.set(0.68,0.85,0.42);torso.position.y=1.02;
  const hips =new THREE.Mesh(boxG,M(0x2a2f42));hips.scale.set(0.6,0.28,0.4);hips.position.y=0.6;
  const head =new THREE.Mesh(new THREE.IcosahedronGeometry(0.3,1),ms);head.position.y=1.68;
  const hair =new THREE.Mesh(boxG,ma);hair.scale.set(0.58,0.22,0.56);hair.position.y=1.85;
  const scarf=new THREE.Mesh(boxG,ma);scarf.scale.set(0.7,0.13,0.46);scarf.position.y=1.44;

  const limb=(w,h,d,mat,x,y)=>{const G=new THREE.Group();
    const m=new THREE.Mesh(boxG,mat);m.scale.set(w,h,d);m.position.y=-h/2;
    G.add(m);G.position.set(x,y,0);return G;};
  const armL=limb(0.2,0.68,0.2,ms,-0.46,1.36),armR=limb(0.2,0.68,0.2,ms,0.46,1.36);
  const legL=limb(0.24,0.62,0.24,M(0x232838),-0.17,0.6),legR=limb(0.24,0.62,0.24,M(0x232838),0.17,0.6);

  const shadow=new THREE.Mesh(shadowG,shadowM);shadow.rotation.x=-Math.PI/2;shadow.position.y=0.02;

  group.add(torso,hips,head,hair,scarf,armL,armR,legL,legR,shadow);
  return {group,torso,head,armL,armR,legL,legR,shadow,scarf,hair};
}
/* one-shot attack poses — kind decides how the body throws the move */
function setPose(c,kind,dur=0.34){c.pose=kind;c.poseT=dur;c.poseMax=dur;}

function animChar(c,speed,t,airborne,dt=0){
  if(c.poseT>0){
    c.poseT-=dt;
    const k=1-c.poseT/c.poseMax;                 // 0 -> 1 through the swing
    const punch=Math.sin(Math.min(k,1)*Math.PI); // ease out and back
    switch(c.pose){
      case"cast":                                 // both arms thrust forward
        c.armL.rotation.x=-1.9*punch;c.armR.rotation.x=-1.9*punch;
        c.torso.rotation.x=0.22*punch;break;
      case"slash":                                // one arm whips across
        c.armR.rotation.x=-2.5*punch;c.armR.rotation.z=-1.1*punch;
        c.armL.rotation.x=0.7*punch;
        c.torso.rotation.y=-0.75*punch;break;
      case"aura":                                 // crouch then throw arms wide
        c.armL.rotation.z=1.5*punch;c.armR.rotation.z=-1.5*punch;
        c.torso.position.y=1.02-0.22*punch;
        c.legL.rotation.x=0.5*punch;c.legR.rotation.x=0.5*punch;break;
      case"slam":                                 // both arms overhead, down hard
        c.armL.rotation.x=-2.9*(1-k);c.armR.rotation.x=-2.9*(1-k);
        c.torso.rotation.x=0.5*k;break;
      case"roar":                                 // transform: arms back, chest out
        c.armL.rotation.x=1.5*punch;c.armR.rotation.x=1.5*punch;
        c.armL.rotation.z=0.7*punch;c.armR.rotation.z=-0.7*punch;
        c.torso.rotation.x=-0.4*punch;break;
      case"hit":                                  // flinch backwards
        c.torso.rotation.x=-0.5*punch;
        c.armL.rotation.x=0.9*punch;c.armR.rotation.x=0.9*punch;break;
    }
    if(c.poseT<=0){c.pose=null;c.torso.rotation.set(0,0,0);
      c.armL.rotation.set(0,0,0);c.armR.rotation.set(0,0,0);}
    return;
  }
  const s=THREE.MathUtils.clamp(speed/11,0,1.4);
  const sw=Math.sin(t*9)*0.72*s;
  if(airborne){c.armL.rotation.x=-2.2;c.armR.rotation.x=-2.2;c.legL.rotation.x=0.4;c.legR.rotation.x=-0.3;}
  else{c.armL.rotation.x=sw;c.armR.rotation.x=-sw;c.legL.rotation.x=-sw;c.legR.rotation.x=sw;}
  c.torso.position.y=1.02+Math.abs(Math.sin(t*9))*0.06*s;
  c.head.position.y=1.68+Math.abs(Math.sin(t*9))*0.05*s;
}
let shadowTick=0;
function placeShadow(c,x,z){
  if((shadowTick++&1)===0&&c._gy!==undefined){var gy=c._gy;}   // refresh every other frame
  else{gy=groundH(x,z);c._gy=gy;}
  c.shadow.position.y=gy-c.group.position.y+0.06;
  const drop=THREE.MathUtils.clamp((c.group.position.y-1.45-gy)/6,0,1);
  c.shadow.material.opacity=0.3*(1-drop);
}

function orbFor(pw){
  const m=new THREE.Mesh(new THREE.IcosahedronGeometry(0.17,0),
    new THREE.MeshBasicMaterial({color:pw.colors[1]}));
  const halo=new THREE.Mesh(new THREE.IcosahedronGeometry(0.34,0),
    new THREE.MeshBasicMaterial({color:pw.colors[0],transparent:true,opacity:0.3,
      blending:THREE.AdditiveBlending,depthWrite:false}));
  m.add(halo);                       // additive shell reads as glow, costs nothing
  return m;
}
function refreshNpc(n){
  for(const o of n.orbs)n.char.group.remove(o);
  n.orbs=n.powers.map(orbFor);
  n.orbs.forEach(o=>n.char.group.add(o));
  const c=n.powers.length?n.powers[0].colors[0]:0x4a4f5c;
  n.char.torso.material.color.set(c);
  n.char.scarf.material.color.set(n.powers.length?n.powers[0].colors[1]:0x3a3f4d);
}
function npcRemove(n,el,byName){
  const i=n.powers.findIndex(p=>p.elements[0]===el);
  if(i<0)return null;
  const lost=n.powers.splice(i,1)[0];
  refreshNpc(n);
  if(byName)feed(`${byName} took ${lost.elementName} from ${n.name}`,"bad");
  return lost;
}

function buildWorld(){
  for(const o of[trees,leaves,leaves2,rocks,grass])if(o)scene.remove(o);
  for(const n of npcs)scene.remove(n.char.group);
  npcs.length=0;

  const LM=c=>new THREE.MeshLambertMaterial({color:c,flatShading:true});
  trees  =new THREE.InstancedMesh(new THREE.CylinderGeometry(0.24,0.42,3.2,5),LM(0x4a3626),120);
  leaves =new THREE.InstancedMesh(new THREE.ConeGeometry(1.75,3.6,7),LM(0x2f6b47),120);
  leaves2=new THREE.InstancedMesh(new THREE.ConeGeometry(1.25,2.8,7),LM(0x3d8257),120);
  rocks  =new THREE.InstancedMesh(new THREE.DodecahedronGeometry(1.1,0),LM(0x6b6f7a),70);
  grass  =new THREE.InstancedMesh(new THREE.ConeGeometry(0.28,0.8,4),LM(0x4f8a55),220);
  const m4=new THREE.Matrix4(),q=new THREE.Quaternion(),sc=new THREE.Vector3(),up=new THREE.Vector3(0,1,0);

  let t=0;
  while(t<120){
    const x=(rng()-0.5)*SIZE*0.92,z=(rng()-0.5)*SIZE*0.92,y=groundH(x,z);
    if(y<WATER+1){continue;}
    const s=0.7+rng()*0.95;
    q.setFromAxisAngle(up,rng()*7);
    trees.setMatrixAt(t,m4.compose(new THREE.Vector3(x,y+1.6*s,z),q,sc.set(s,s,s)));
    leaves.setMatrixAt(t,m4.compose(new THREE.Vector3(x,y+3.7*s,z),q,sc.set(s,s,s)));
    leaves2.setMatrixAt(t,m4.compose(new THREE.Vector3(x,y+5.0*s,z),q,sc.set(s,s,s)));
    t++;
  }
  for(let i=0;i<70;i++){
    const x=(rng()-0.5)*SIZE*0.9,z=(rng()-0.5)*SIZE*0.9,s=0.5+rng()*1.6;
    q.setFromAxisAngle(new THREE.Vector3(rng(),1,rng()).normalize(),rng()*7);
    rocks.setMatrixAt(i,m4.compose(new THREE.Vector3(x,groundH(x,z)+s*0.35,z),q,sc.set(s,s,s)));
  }
  let gI=0;
  while(gI<220){
    const x=(rng()-0.5)*SIZE*0.95,z=(rng()-0.5)*SIZE*0.95,y=groundH(x,z);
    if(y<WATER+0.8){continue;}
    const s=0.6+rng()*0.9;
    q.setFromAxisAngle(up,rng()*7);
    grass.setMatrixAt(gI,m4.compose(new THREE.Vector3(x,y+0.35*s,z),q,sc.set(s,s,s)));
    gI++;
  }
  scene.add(trees,leaves,leaves2,rocks,grass);

  /* ---- landmarks: a ruined arena in the central bowl, crystal clusters around it ---- */
  if(marks)scene.remove(marks);
  marks=new THREE.Group();
  const stoneM=new THREE.MeshLambertMaterial({color:0x8d8878,flatShading:true});
  const stoneD=new THREE.MeshLambertMaterial({color:0x6e6a5e,flatShading:true});
  for(let i=0;i<14;i++){                                  // broken pillar ring
    const a=i/14*Math.PI*2,rr=19+Math.sin(i*2.3)*1.6;
    const x=Math.cos(a)*rr,z=Math.sin(a)*rr,y=groundH(x,z);
    const hgt=3.5+((i*7)%5)*1.5;
    const p=new THREE.Mesh(new THREE.CylinderGeometry(0.75,0.95,hgt,7),stoneM);
    p.position.set(x,y+hgt/2,z);p.rotation.z=(Math.sin(i*3.1))*0.06;
    marks.add(p);
    if(i%3===0){                                          // fallen capital
      const cap=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.7,2.2),stoneD);
      cap.position.set(x,y+hgt+0.35,z);cap.rotation.y=i;marks.add(cap);
    }
  }
  {                                                        // central dais
    const d=new THREE.Mesh(new THREE.CylinderGeometry(7.5,8.6,1.4,20),stoneD);
    d.position.set(0,groundH(0,0)+0.5,0);marks.add(d);
    const d2=new THREE.Mesh(new THREE.CylinderGeometry(5.2,5.8,0.5,20),stoneM);
    d2.position.set(0,groundH(0,0)+1.4,0);marks.add(d2);
  }
  for(let i=0;i<12;i++){                                   // glowing crystal clusters
    let x,z,y,tries=0;
    do{x=(rng()-0.5)*SIZE*0.8;z=(rng()-0.5)*SIZE*0.8;y=groundH(x,z);}
    while((y<WATER+1||Math.hypot(x,z)<26)&&++tries<20);
    const tint=[0x6ad4ff,0xa77bff,0x62ffbe,0xffcf5c][i%4];
    const cm=new THREE.MeshBasicMaterial({color:tint,transparent:true,opacity:0.85});
    for(let k=0;k<3;k++){
      const s=0.7+rng()*1.5;
      const c=new THREE.Mesh(new THREE.OctahedronGeometry(s,0),cm);
      c.position.set(x+(rng()-0.5)*2.4,y+s*0.75,z+(rng()-0.5)*2.4);
      c.rotation.set(rng(),rng(),rng());
      marks.add(c);
    }
    // no point light here on purpose — 22 of them tanked the framerate
  }
  scene.add(marks);

  for(let i=0;i<8;i++){
    const pw=rollPower(1,rng);
    pw.addXp(xpFor(2)*(4+Math.floor(rng()*50)));
    const char=makeChar(0xd6b58f,pw.colors[0],pw.colors[1]);
    let x,z,y;
    do{x=(rng()-0.5)*160;z=(rng()-0.5)*160;y=groundH(x,z);}while(y<WATER+1);
    char.group.position.set(x,y+0.02,z);
    scene.add(char.group);
    const n={char,powers:[pw],orbs:[],name:NAMES[i],dir:rng()*7,t:rng()*10,i,phase:rng()*6,
      maxHp:maxHpFor(pw),hp:maxHpFor(pw),aggro:0,koT:0,atkCd:rng()*3};
    refreshNpc(n);
    npcs.push(n);
  }
}

      v:new THREE.Vector3((Math.random()-0.5)*12,Math.random()*9+2,(Math.random()-0.5)*12)});
  }
}
function muzzle(p,color){
  const m=new THREE.Mesh(new THREE.IcosahedronGeometry(0.45,0),
    new THREE.MeshBasicMaterial({color,transparent:true,depthWrite:false}));
  m.position.copy(p);scene.add(m);fx.push({o:m,life:0.14,max:0.14,kind:"flash"});
}
function popNum(pos,n,color){
  const cv=document.createElement("canvas");cv.width=128;cv.height=64;
  const c=cv.getContext("2d");
  c.font="bold 46px system-ui,sans-serif";c.textAlign="center";c.textBaseline="middle";
  c.lineWidth=7;c.strokeStyle="#000";c.strokeText(n,64,32);
  c.fillStyle=hex(color);c.fillText(n,64,32);
  const s=new THREE.Sprite(new THREE.SpriteMaterial(
    {map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false,depthTest:false}));
  s.position.copy(pos);s.scale.set(1.7,0.85,1);scene.add(s);
  fx.push({o:s,life:0.95,max:0.95,kind:"num"});
}

function stepFx(dt){
  for(let i=fx.length-1;i>=0;i--){
    const f=fx[i];f.life-=dt;const t=Math.max(f.life/f.max,0);
    if(f.kind==="num"){f.o.position.y+=2.6*dt;f.o.material.opacity=Math.min(1,t*2.2);}
    if(f.kind==="wave"){const s=f.R*(1-t)+0.6;f.o.scale.set(s,s*0.65,s);f.o.material.opacity=t*0.5;}
    if(f.kind==="slash"){const s=1+(1-t)*0.9;f.o.scale.set(s,s,s);f.o.material.opacity=t;}
    if(f.kind==="pillar"){f.o.scale.set(1+(1-t)*0.8,1,1+(1-t)*0.8);f.o.material.opacity=t*0.55;
      f.o.rotation.y+=dt*4;}
    if(f.kind==="ring"){const s=1+(1-t)*7;f.o.scale.set(s,s,s);f.o.material.opacity=t;f.o.lookAt(camera.position);}
    if(f.kind==="spark"){f.v.y-=22*dt;f.o.position.addScaledVector(f.v,dt);f.o.material.opacity=t;
      f.o.rotation.x+=dt*10;f.o.rotation.y+=dt*8;}
    if(f.kind==="flash"){const s=1+(1-t)*2;f.o.scale.set(s,s,s);f.o.material.opacity=t*0.9;}
    if(f.kind==="burst"){const s=1+(1-t)*3.2;f.o.scale.set(s,s,s);f.o.material.opacity=t*0.7;}
    if(f.life<=0){scene.remove(f.o);f.o.material?.dispose?.();fx.splice(i,1);}
  }
}
let shakeAmt=0;
const shake=n=>{shakeAmt=Math.max(shakeAmt,n);};
const $flash=document.getElementById("flash");
function whiteFlash(a=0.3){$flash.style.opacity=a;
  setTimeout(()=>{$flash.style.transition="opacity .35s";$flash.style.opacity=0;
    setTimeout(()=>$flash.style.transition="",360);},20);}

const beamG=new THREE.CylinderGeometry(0.09,0.09,1,6,1,true);
function makeBeam(){const m=new THREE.Mesh(beamG,new THREE.MeshBasicMaterial(
  {color:0xffffff,transparent:true,opacity:0.75,depthWrite:false}));m.visible=false;scene.add(m);return m;}
const myBeam=makeBeam();
function aimBeam(mesh,from,to,color,prog){
  mesh.visible=true;
  const d=new THREE.Vector3().subVectors(to,from),len=d.length();
  mesh.position.copy(from).addScaledVector(d,0.5);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.clone().normalize());
  const w=0.5+prog*2.4;mesh.scale.set(w,len,w);
  mesh.material.color.set(color);
  mesh.material.opacity=0.32+prog*0.55+Math.sin(performance.now()*0.02)*0.1;
}

const shots=[];
const shotG=new THREE.IcosahedronGeometry(0.3,0);
function spawnShot(from,dir,color,mine){
  const m=new THREE.Mesh(shotG,new THREE.MeshBasicMaterial({color}));
  m.position.copy(from);scene.add(m);
  m.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.62,0),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.28,
      blending:THREE.AdditiveBlending,depthWrite:false})));
  shots.push({mesh:m,dir:dir.clone(),life:2.4,color,mine,trail:0});
  muzzle(from,color);
}
/* ---- the six attacks, one per delivery gene ---- */
const hazards=[],summons=[];
const aimDir=()=>new THREE.Vector3(-Math.sin(player.yaw)*Math.cos(player.pitch),
  Math.sin(player.pitch),-Math.cos(player.yaw)*Math.cos(player.pitch)).normalize();

function attack(){
  if(player.ko>0||player.cd>0)return;
  const p=active();
  let mode=p.actDe[0];
  /* Transform is a buff, not a hit. Once you're changed, the same button
     becomes a heavy strike — so it's a complete playstyle on its own. */
  if(mode==="Transform"&&player.tf>0)mode="Strike";
  const cfg=ATK[mode]||ATK.Projectile;
  /* the transform speeds up your OTHER powers, but not its own strike —
     otherwise it stacks with itself and outclasses everything */
  const hasted=player.tf>0&&mode!=="Transform"&&mode!=="Strike";
  player.cd=cfg.cd*(hasted?0.6:1);
  const[c1,c2]=p.colors;
  switch(mode){
    case"Aura":      atkAura(p,c1,c2);break;
    case"Touch":     atkTouch(p,c1,c2);break;
    case"Strike":    atkTouch(p,c1,c2,"Strike");break;
    case"Transform": atkTransform(p,c1,c2);break;
    case"Terrain":   atkTerrain(p,c1,c2);break;
    case"Summon":    atkSummon(p,c1,c2);break;
    default:         atkProjectile(p,c1);
  }
}

function atkProjectile(p,c1){
  setPose(me,"cast",0.30);
  const dir=aimDir();
  const from=player.pos.clone().add(new THREE.Vector3(0,1.35,0)).addScaledVector(dir,1.1);
  spawnShot(from,dir,c1,true);shake(0.13);
  netSend({t:"shot",x:from.x,y:from.y,z:from.z,dx:dir.x,dy:dir.y,dz:dir.z,c:c1});
}

function atkAura(p,c1,c2){
  setPose(me,"aura",0.45);
  const R=ATK.Aura.range;
  const w=new THREE.Mesh(new THREE.SphereGeometry(1,14,10),
    new THREE.MeshBasicMaterial({color:c2,transparent:true,opacity:0.5,
      side:THREE.DoubleSide,depthWrite:false}));
  w.position.copy(player.pos).add(new THREE.Vector3(0,1,0));scene.add(w);
  fx.push({o:w,life:0.5,max:0.5,kind:"wave",R});
  impact(player.pos.clone().add(new THREE.Vector3(0,1,0)),c1);
  shake(0.55);
  forEachEnemy((e,pos)=>{
    if(pos.distanceTo(player.pos)<R) hurt(e,dmgOf(p,"Aura",elsOf(e)),c1);
  });
  netSend({t:"aura",x:player.pos.x,y:player.pos.y,z:player.pos.z,c:c2,r:R});
}

function atkTouch(p,c1,c2,mode="Touch"){
  const big=mode==="Strike";
  setPose(me,big?"slam":"slash",big?0.4:0.32);
  const dir=aimDir();
  const hit=player.pos.clone().addScaledVector(dir,big?2.9:2.4).add(new THREE.Vector3(0,1.1,0));
  const slash=new THREE.Mesh(new THREE.TorusGeometry(big?1.6:1.15,big?0.2:0.13,5,14,Math.PI*1.1),
    new THREE.MeshBasicMaterial({color:c2,transparent:true,depthWrite:false}));
  slash.position.copy(hit);slash.lookAt(camera.position);slash.rotation.z=Math.random()*3;
  scene.add(slash);fx.push({o:slash,life:big?0.3:0.24,max:big?0.3:0.24,kind:"slash"});
  shake(big?0.5:0.3);
  let landed=false;
  forEachEnemy((e,pos)=>{
    if(pos.distanceTo(hit)<(big?3.2:2.6)){ hurt(e,dmgOf(p,mode,elsOf(e)),c1); landed=true; }
  });
  if(landed){shake(big?1.1:0.8);impact(hit,c1);if(big)impact(hit,c2);}
  netSend({t:"touch",x:hit.x,y:hit.y,z:hit.z,c:c2});
}

function atkTransform(p,c1,c2){
  setPose(me,"roar",0.65);
  player.tf=9;
  feed(`TRANSFORMED — ${p.elementName}`,"big");
  feed("click to strike while you're changed","good");
  whiteFlash(0.4);shake(1.4);
  const pos=player.pos.clone().add(new THREE.Vector3(0,1.1,0));

  col.position.copy(player.pos).add(new THREE.Vector3(0,4,0));scene.add(col);
  fx.push({o:col,life:0.7,max:0.7,kind:"pillar"});

}

function atkTerrain(p,c1,c2){
  setPose(me,"slam",0.45);
  const dir=aimDir();
  const flat=new THREE.Vector3(dir.x,0,dir.z).normalize();
  const at=player.pos.clone().addScaledVector(flat,7);
  at.y=groundH(at.x,at.z)+0.12;
  const disc=new THREE.Mesh(new THREE.CircleGeometry(3.6,20),
    new THREE.MeshBasicMaterial({color:c1,transparent:true,opacity:0.45,depthWrite:false}));
  disc.rotation.x=-Math.PI/2;disc.position.copy(at);scene.add(disc);
  const spike=new THREE.Mesh(new THREE.ConeGeometry(0.9,2.2,6),
    new THREE.MeshBasicMaterial({color:c2,transparent:true,opacity:0.8,depthWrite:false}));
  spike.position.copy(at).add(new THREE.Vector3(0,1.1,0));scene.add(spike);
  hazards.push({disc,spike,pos:at,r:3.6,life:6.5,tick:0,power:p,color:c1,mine:true});
  shake(0.45);
  netSend({t:"terrain",x:at.x,y:at.y,z:at.z,c1,c2});
}

function atkSummon(p,c1,c2){
  setPose(me,"cast",0.4);
  const m=new THREE.Mesh(new THREE.IcosahedronGeometry(0.42,0),
    new THREE.MeshBasicMaterial({color:c2}));
  m.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.8,0),
    new THREE.MeshBasicMaterial({color:c1,transparent:true,opacity:0.26,
      blending:THREE.AdditiveBlending,depthWrite:false})));
  m.position.copy(player.pos).add(new THREE.Vector3(0,2.4,0));
  scene.add(m);
  summons.push({mesh:m,life:14,cd:0,power:p,color:c1,phase:Math.random()*6});

/* ---- who can be hit ---- */
const elsOf=e=>e.kind==="npc"?(npcTop(e.ref)?.actEl??[]):(e.ref.power?.actEl??[]);
function forEachEnemy(fn){
  for(const n of npcs) fn({kind:"npc",ref:n},n.char.group.position);
  for(const[id,r]of remotes) fn({kind:"player",ref:r,id},r.char.group.position);
}

function hurt(e,amount,color){
  const dmg=Math.max(1,Math.round(amount));
  if(e.kind==="npc"){
    const n=e.ref;
    n.hp-=dmg;n.aggro=6;
    setPose(n.char,"hit",0.26);
    const kb=n.char.group.position.clone().sub(player.pos).setY(0).normalize()
      .multiplyScalar(Math.min(2.2,dmg*0.05));
    n.knock=(n.knock||new THREE.Vector3()).add(kb);
    hitstop=Math.max(hitstop,dmg>25?0.075:0.035);
    popNum(n.char.group.position.clone().add(new THREE.Vector3(0,2.3,0)),dmg,color);
    impact(n.char.group.position.clone().add(new THREE.Vector3(0,1.1,0)),color);
    if(n.hp<=0)koNpc(n);
  }else{
    popNum(e.ref.char.group.position.clone().add(new THREE.Vector3(0,2.3,0)),dmg,color);
    impact(e.ref.char.group.position.clone().add(new THREE.Vector3(0,1.1,0)),color);
    netSend({t:"dmg",to:e.id,n:dmg,byName:S.name});
  }
  active().addXp(Math.round(xpFor(active().level+1)*0.02));
}

function koNpc(n){
  n.hp=0;n.koT=9;
  n.char.group.rotation.z=Math.PI/2.2;
  feed(`${n.name} is down`,"good");
  active().addXp(Math.round(xpFor(active().level+1)*0.3));
  persist();drawHUD();
}

function takeDamage(dmg,byName){
  if(player.ko>0)return;
  player.hp-=Math.round(dmg*(player.tf>0?0.7:1));
  shake(0.7);whiteFlash(0.14);
  if(player.hp<=0){
    player.hp=0;player.ko=6;player.tf=0;
    feed(`You were taken down${byName?" by "+byName:""}`,"bad");
  }
  drawHUD();
}

let target=null,chan=null;
const npcTop=n=>n.powers.length?n.powers[0]:null;

function beginChan(mode){
  if(!target||chan)return;
  const isP=target.kind==="player",r=target.ref;
  if(mode==="ofa"){
    if(!S.ofa){feed("you don't hold One For All","bad");return;}
    if(!isP){feed("only a real person can carry One For All","bad");return;}
  }
  if(mode==="steal"){
    if(!S.ofa){feed("you can't take powers — only One For All can","bad");return;}
    if(!isP&&!r.powers.length){feed(`${r.name} has nothing left`,"bad");return;}
    if(isP&&r.heldN<=1){feed(`${r.name} has only one power — you can't take their last`,"bad");return;}
    if(S.held.length>=MAX_SLOTS){feed("slots full — fuse two (C) or give one away (G)","bad");return;}
  }else{
    if(S.held.length<=1){feed("that's your only power","bad");return;}
    if(isP&&r.heldN>=MAX_SLOTS){feed(`${r.name}'s slots are full`,"bad");return;}
  }
  chan={mode,prog:0,ref:r,kind:target.kind,id:target.id,name:r.name};
}
function cancelChan(why){
  if(!chan)return;
  if(why)feed(why);
  chan=null;myBeam.visible=false;
  document.getElementById("chan").style.display="none";
  netSend({t:"beam",p:0});
}
function finishSteal(){
  const c=chan;
  if(c.kind==="npc"){
    const src=npcTop(c.ref);
    if(!src){cancelChan();return;}
    const taken=Power.from(src.toJSON());
    taken.level=Math.max(1,Math.floor(src.level*0.35));
    npcRemove(c.ref,src.elements[0]);
    S.held.push(taken);S.stolen++;
    feed(`TOOK ${taken.elementName} from ${c.ref.name}`,"big");
    netSend({t:"npcTaken",i:c.ref.i,el:src.elements[0],byName:S.name});
  }else{
    const r=c.ref;
    S.held.push(Power.from(r.power.toJSON()));S.stolen++;
    feed(`TOOK ${r.power.elementName} from ${r.name}`,"big");
    netSend({t:"steal",to:c.id,el:r.power.elements[0],lv:r.power.level,byName:S.name});
  }
  feed(`stockpile +4 to everything you hold`,"good");
  whiteFlash(0.42);shake(1.1);
  impact(c.ref.char.group.position.clone().add(new THREE.Vector3(0,1.3,0)),0xffffff);
  active().addXp(Math.round(xpFor(active().level+1)*0.5));
  cancelChan();persist();drawHUD();
}
function finishOfa(){
  const c=chan;
  S.ofa=false;
  netSend({t:"ofa",to:c.id,byName:S.name});
  feed(`You passed ONE FOR ALL to ${c.name}.`,"big");
  feed("you keep what you hold, but you can no longer take or fuse","bad");
  whiteFlash(0.75);shake(1.8);
  const p=c.ref.char.group.position.clone().add(new THREE.Vector3(0,1.3,0));
  impact(p,0xffd54f);impact(p,0xffffff);
  cancelChan();drawHUD();
}

function finishGive(){
  const c=chan,gift=S.held[S.active];
  if(c.kind==="player")netSend({t:"give",to:c.id,power:gift.toJSON(),byName:S.name});
  else{
    c.ref.powers.push(Power.from(gift.toJSON()));   // ADDS — does not replace
    refreshNpc(c.ref);
    netSend({t:"npcGiven",i:c.ref.i,power:gift.toJSON(),byName:S.name});
  }
  S.held.splice(S.active,1);
  S.active=Math.min(S.active,S.held.length-1);S.given++;
  feed(`GAVE ${gift.elementName} to ${c.name}`,"big");
  impact(c.ref.char.group.position.clone().add(new THREE.Vector3(0,1.3,0)),gift.colors[1]);
  whiteFlash(0.25);
  cancelChan();persist();drawHUD();
}

const $stats=document.getElementById("stats"),$slots=document.getElementById("slots"),
      $target=document.getElementById("target"),$feed=document.getElementById("feed"),

const lines=[];
function feed(msg,cls=""){lines.unshift(`<div class="${cls}">${msg}</div>`);
  lines.length=Math.min(lines.length,8);$feed.innerHTML=lines.join("");}

function drawHUD(){
  const p=active(),[c1,c2]=p.colors;
  const pct=p.maxed?100:(p.xp/xpFor(p.level+1))*100;
  const hpPct=Math.max(0,player.hp/player.maxHp*100);
  const hpCol=hpPct>50?"#7ee787":hpPct>22?"#ffd54f":"#ff7b72";
  $stats.innerHTML=`<div class="pname" style="color:${hex(c2)}">${p.name}${p.fused?" ✦":""}</div>
    <div class="dim">gen ${p.generation} · lvl ${p.level}/${p.levelCap} · potency ${myPotency()}</div>
    <div class="bar" style="height:9px"><i style="width:${hpPct}%;background:${hpCol}"></i></div>
    <div class="dim">${Math.max(0,Math.round(player.hp))} / ${player.maxHp} hp${
      player.ko>0?` · <span style="color:#ff7b72">DOWN ${Math.ceil(player.ko)}s</span>`:""}${
      player.tf>0?` · <span style="color:#ffd54f">TRANSFORMED ${Math.ceil(player.tf)}s</span>`:""}</div>
    <div class="bar"><i style="width:${pct}%;background:linear-gradient(90deg,${hex(c1)},${hex(c2)})"></i></div>
    <div class="dim">${
      p.actDe[0]==="Transform"
        ? (player.tf>0?"Strike — heavy melee while changed":"Transform — click to change, then strike")
        : `${p.actDe[0]} attack`
    } · ${(ATK[p.actDe[0]==="Transform"&&player.tf>0?"Strike":p.actDe[0]]?.cd??0.34)}s cooldown</div>
    ${S.ofa
      ?`<div class="dim" style="color:#ffd54f">★ ONE FOR ALL · ${S.held.length}/${MAX_SLOTS} held · +${stockpile()} stockpile</div>
        <div class="dim">${S.stolen} taken · ${S.given} given · ${S.fusions} fused</div>`
      :`<div class="dim">${S.held.length} power${S.held.length>1?"s":""} · you cannot take or fuse</div>
        <div class="dim">${S.given} given</div>`}`;
  $slots.innerHTML=S.held.map((h,i)=>{const[a,b]=h.colors;
    return `<div class="slot ${i===S.active?"on":""} ${h.fused?"fus":""}" style="color:${hex(a)}">
      <span class="k">${i+1}</span><b style="color:${hex(b)}">${h.elementName}</b>
      <span class="k">lv ${h.level}${h.fused?" ✦":""}</span></div>`;}).join("")
    +(S.held.length>1?`<div class="slot" style="opacity:.7"><span class="k">C</span><b>FUSE</b>
      <span class="k">${S.active+1}+${((S.active+1)%S.held.length)+1}</span></div>`:"");
  refreshMyOrbs();
  updateNet();
}

/* ==================================================================== */
/*  LOOP                                                                 */
/* ==================================================================== */
const clock=new THREE.Clock();
const fwd=new THREE.Vector3(),right=new THREE.Vector3(),move=new THREE.Vector3();
let netClock=0,T=0,hudClock=0,hitstop=0;

function tick(){
  let dt=Math.min(clock.getDelta(),0.05);
  /* hitstop — the world stutters for a few frames on a solid hit.
     Cheapest way to make an attack feel like it connected. */
  if(hitstop>0){hitstop-=dt;dt*=0.16;}
  T+=dt;

  const ease=1-Math.exp(-SMOOTH*dt);
  player.yaw+=(look.yaw-player.yaw)*ease;
  player.pitch+=(look.pitch-player.pitch)*ease;

  fwd.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
  right.set(-fwd.z,0,fwd.x);move.set(0,0,0);
  if(keys.KeyW)move.add(fwd);if(keys.KeyS)move.sub(fwd);
  if(keys.KeyD)move.add(right);if(keys.KeyA)move.sub(right);
  const spd=keys.ShiftLeft?20:11;
  player.speed=move.lengthSq()?spd:0;
  if(move.lengthSq())player.pos.add(move.normalize().multiplyScalar(spd*dt));
  const lim=SIZE/2-6;
  player.pos.x=THREE.MathUtils.clamp(player.pos.x,-lim,lim);
  player.pos.z=THREE.MathUtils.clamp(player.pos.z,-lim,lim);

  const floor=Math.max(groundH(player.pos.x,player.pos.z),WATER-0.6)+0.02;
  if(keys.Space&&player.ground){player.vy=10;player.ground=false;}
  player.vy-=26*dt;player.pos.y+=player.vy*dt;
  if(player.pos.y<=floor){player.pos.y=floor;player.vy=0;player.ground=true;}

  me.group.position.copy(player.pos);
  me.group.rotation.y=player.yaw;
  animChar(me,player.speed,T,!player.ground,dt);
  placeShadow(me,player.pos.x,player.pos.z);

  crown.visible=S.ofa;
  crown.rotation.z+=dt*1.2;
  crown.position.y=2.16+Math.sin(T*2)*0.05;
  const[ac,ac2]=active().colors;
  auraM.color.setHex(ac);
  auraM.opacity=0.11+Math.sin(T*3)*0.045;
  aura.rotation.y+=dt*0.6;aura.rotation.x+=dt*0.25;
  me.scarf.material.color.setHex(ac2);
  myOrbs.forEach((o,i)=>{
    const a=T*1.5+i*(Math.PI*2/Math.max(myOrbs.length,1));
    o.position.set(Math.cos(a)*1.15,1.5+Math.sin(T*2+i)*0.12,Math.sin(a)*1.15);
  });

  const cd=6.8;
  camera.position.set(player.pos.x+Math.sin(player.yaw)*cd,
    player.pos.y+3.6-player.pitch*4.2,player.pos.z+Math.cos(player.yaw)*cd);
  camera.lookAt(player.pos.x,player.pos.y+1.3,player.pos.z);
  if(shakeAmt>0.001){
    camera.position.x+=(Math.random()-0.5)*shakeAmt;
    camera.position.y+=(Math.random()-0.5)*shakeAmt;
    camera.position.z+=(Math.random()-0.5)*shakeAmt;
    shakeAmt*=Math.pow(0.0015,dt);
  }
  water.position.y=WATER+Math.sin(T*0.8)*0.06;
  water.position.x=player.pos.x;water.position.z=player.pos.z;   // keep the lake plane under you
  clouds.rotation.y+=dt*0.008;
  motes.position.set(                                            // motes follow, wrapped
    Math.floor(player.pos.x/moteR)*moteR,0,Math.floor(player.pos.z/moteR)*moteR);
  motes.rotation.y=T*0.02;

  /* -- cooldowns, transform, knockdown -- */
  if(player.cd>0)player.cd-=dt;
  if(player.tf>0){
    player.tf-=dt;
    const k=1+0.34*Math.min(1,player.tf);
    me.group.scale.setScalar(k);
    auraM.opacity=0.3+Math.sin(T*11)*0.1;
    if(player.tf<=0){me.group.scale.setScalar(1);feed("transformation ended");}
  }
  if(player.ko>0){
    player.ko-=dt;
    me.group.rotation.z=Math.PI/2.2;
    if(player.ko<=0){
      player.hp=player.maxHp;me.group.rotation.z=0;
      feed("back on your feet","good");drawHUD();
    }
  }else me.group.rotation.z=0;
  player.maxHp=maxHpFor(active())+stockpile()*2;
  player.hp=Math.min(player.hp,player.maxHp);

  /* -- npcs -- */
  target=null;let best=REACH;
  for(const n of npcs){
    const g=n.char.group;
    if(n.koT>0){                                    // downed: lie still, then get up
      n.koT-=dt;g.rotation.z=Math.PI/2.2;
      placeShadow(n.char,g.position.x,g.position.z);
      if(n.koT<=0){n.hp=n.maxHp;g.rotation.z=0;n.aggro=0;}
      const dd=g.position.distanceTo(player.pos);
      if(dd<best){best=dd;target={kind:"npc",ref:n,id:null};}
      continue;
    }
    n.t+=dt;n.atkCd-=dt;
    if(n.aggro>0)n.aggro-=dt;
    const dist=g.position.distanceTo(player.pos);
    let sp=2.4;
    if(n.aggro>0&&n.powers.length&&player.ko<=0){    // chase and fight back
      const to=player.pos.clone().sub(g.position);
      n.dir=Math.atan2(to.x,to.z);
      sp=7.5;
      if(dist<3.2&&n.atkCd<=0){
        n.atkCd=1.5;
        const np=npcTop(n);
        takeDamage(dmgOf(np,"Touch",active().actEl),n.name);
        impact(player.pos.clone().add(new THREE.Vector3(0,1.1,0)),np.colors[0]);
        popNum(player.pos.clone().add(new THREE.Vector3(0,2.4,0)),"!",np.colors[1]);
      }
    }else if(n.t>3){n.t=0;n.dir+=(Math.random()-0.5)*2.4;}
    const nx=g.position.x+Math.sin(n.dir)*sp*dt,nz=g.position.z+Math.cos(n.dir)*sp*dt;
    const ny=groundH(nx,nz);
    if(Math.abs(nx)<125&&Math.abs(nz)<125&&ny>WATER+0.5)g.position.set(nx,ny+0.02,nz);
    else n.dir+=2.6;
    if(n.knock&&n.knock.lengthSq()>0.001){          // shove back from the last hit
      g.position.addScaledVector(n.knock,dt*9);
      n.knock.multiplyScalar(Math.pow(0.02,dt));
      g.position.y=groundH(g.position.x,g.position.z)+0.02;
    }
    g.rotation.y=n.dir;
    animChar(n.char,sp,T+n.phase,false,dt);
    placeShadow(n.char,g.position.x,g.position.z);
    n.orbs.forEach((o,i)=>{
      const a=T*1.3+i*(Math.PI*2/Math.max(n.orbs.length,1))+n.phase;
      o.position.set(Math.cos(a)*1.05,1.55+Math.sin(T*2+i)*0.1,Math.sin(a)*1.05);
    });
    const d=g.position.distanceTo(player.pos);
    if(d<best){best=d;target={kind:"npc",ref:n,id:null};}
  }
  for(const[id,r]of remotes){
    r.char.group.position.lerp(r.target,Math.min(1,10*dt));
    r.char.group.rotation.y=r.yaw;
    animChar(r.char,r.moving?11:0,T,false,dt);
    placeShadow(r.char,r.char.group.position.x,r.char.group.position.z);
    r.char.scarf.material.color.set(r.power.colors[1]);
    r.ring.material.color.set(r.ofa?0xffd54f:0xffffff);   // gold ring = they hold One For All
    r.ring.scale.setScalar(r.ofa?1.15:1);
    r.ring.rotation.z+=dt*1.2;
    if(r.tfT>0){r.tfT-=dt;r.char.group.scale.setScalar(1+0.34*Math.min(1,r.tfT));}
    else r.char.group.scale.setScalar(1);
    const d=r.char.group.position.distanceTo(player.pos);
    if(d<best){best=d;target={kind:"player",ref:r,id};}
    if(r.beamP>0){r.beam??=makeBeam();
      aimBeam(r.beam,r.char.group.position.clone().add(new THREE.Vector3(0,1.2,0)),
        player.pos.clone().add(new THREE.Vector3(0,1.2,0)),0xffffff,r.beamP);
    }else if(r.beam)r.beam.visible=false;
  }

  /* -- channel -- */
  if(chan){
    const tp=chan.ref.char.group.position;
    if(tp.distanceTo(player.pos)>REACH+2)cancelChan("target got away");
    else{
      const theirs=chan.kind==="npc"?(npcTop(chan.ref)?.potency??10):chan.ref.power.potency;
      const rate=chan.mode==="give"?1/GIVE_TIME
        :chan.mode==="ofa"?1/OFA_TIME
        :(1/STEAL_BASE)*THREE.MathUtils.clamp(myPotency()/(myPotency()+theirs)*1.9,0.28,1.5);
      chan.prog+=rate*dt;
      const col=chan.mode==="give"?active().colors[1]:chan.mode==="ofa"?0xffd54f:0xffffff;
      aimBeam(myBeam,player.pos.clone().add(new THREE.Vector3(0,1.2,0)),
        tp.clone().add(new THREE.Vector3(0,1.2,0)),col,chan.prog);
      $chan.style.display="block";
      const verb=chan.mode==="steal"?"TAKING FROM":chan.mode==="ofa"?"PASSING ONE FOR ALL TO":"GIVING TO";
      $chan.innerHTML=`<div class="dim">${verb} ${chan.name}</div>
        <div class="bar"><i style="width:${Math.min(100,chan.prog*100)}%;background:${
          chan.mode==="steal"?"#fff":chan.mode==="ofa"?"#ffd54f":hex(active().colors[1])}"></i></div>
        <div class="dim">${Math.round(Math.min(100,chan.prog*100))}%</div>`;
      if(chan.kind==="player")netSend({t:"beam",p:chan.prog,kind:chan.mode});
      if(chan.prog>=1)chan.mode==="steal"?finishSteal():chan.mode==="ofa"?finishOfa():finishGive();
    }
  }

  /* -- target readout -- */
  if(target&&!chan){
    const isP=target.kind==="player",r=target.ref;
    const pw=isP?r.power:npcTop(r);
    const canGive=S.held.length>1;
    const give=canGive?` &nbsp; hold <b>G</b> give ${active().elementName}`:"";
    const take=S.ofa?`hold <b>E</b> take`:`<span style="opacity:.5">you cannot take</span>`;
    const pass=(S.ofa&&isP)?`<div class="dim" style="color:#ffd54f">hold <b>V</b> pass ONE FOR ALL</div>`:"";
    const count=isP?r.heldN:r.powers.length;
    $target.style.display="block";
    $target.innerHTML=pw
      ?`<div class="pname" style="color:${hex(pw.colors[1])}">${r.name}${isP?" · player":""}${
          isP&&r.ofa?` <span style="color:#ffd54f">★</span>`:""}</div>
        <div class="dim">${pw.name} · lvl ${pw.level} · potency ${pw.potency}</div>
        ${!isP?`<div class="bar" style="height:7px"><i style="width:${
          Math.max(0,r.hp/r.maxHp*100)}%;background:${r.hp/r.maxHp>0.35?"#7ee787":"#ff7b72"}"></i></div>
          <div class="dim">${Math.max(0,Math.round(r.hp))} / ${r.maxHp} hp${
          r.koT>0?" · DOWN":""}</div>`:""}
        <div class="dim">${count} power${count>1?"s":""} held</div>
        <div class="dim">${take}${give}</div>${pass}`
      :`<div class="pname">${r.name}</div><div class="dim">powerless</div>
        <div class="dim">${canGive?`hold <b>G</b> give ${active().elementName}`:"nothing spare to give"}</div>${pass}`;
  }else if(!chan)$target.style.display="none";

  /* -- shots -- */
  for(let i=shots.length-1;i>=0;i--){
    const s=shots[i];
    s.mesh.position.addScaledVector(s.dir,44*dt);
    s.mesh.rotation.x+=dt*12;s.mesh.rotation.y+=dt*9;
    s.life-=dt;s.trail+=dt;
    if(s.trail>0.04){s.trail=0;
      const t=new THREE.Mesh(shotG,new THREE.MeshBasicMaterial({color:s.color,transparent:true,depthWrite:false}));
      t.position.copy(s.mesh.position);t.scale.setScalar(0.55);scene.add(t);
      fx.push({o:t,life:0.3,max:0.3,kind:"flash"});}
    const gy=groundH(s.mesh.position.x,s.mesh.position.z);
    if(s.life<=0||s.mesh.position.y<gy){impact(s.mesh.position,s.color);scene.remove(s.mesh);shots.splice(i,1);continue;}
    let hit=false;
    if(s.ghost){/* purely cosmetic (summon tracer) — damage already applied */}
    else if(s.mine){
      for(const n of npcs){
        if(n.koT>0)continue;
        if(s.mesh.position.distanceTo(n.char.group.position.clone().setY(n.char.group.position.y+1))<1.7){
          shake(0.25);hurt({kind:"npc",ref:n},dmgOf(active(),"Projectile",npcTop(n)?.actEl??[]),s.color);
          persist();drawHUD();hit=true;break;}
      }
      if(!hit)for(const[id,r]of remotes)
        if(s.mesh.position.distanceTo(r.char.group.position.clone().setY(r.char.group.position.y+1))<1.7){
          shake(0.25);hurt({kind:"player",ref:r,id},dmgOf(active(),"Projectile",r.power?.actEl??[]),s.color);
          hit=true;break;}
    }else if(s.mesh.position.distanceTo(player.pos.clone().setY(player.pos.y+1))<1.7){
      impact(s.mesh.position,s.color);takeDamage(s.dmg??8);hit=true;}
    if(hit){scene.remove(s.mesh);shots.splice(i,1);}
  }

  /* -- terrain hazards: damage over time inside the zone -- */
  for(let i=hazards.length-1;i>=0;i--){
    const h=hazards[i];
    h.life-=dt;h.tick-=dt;
    h.spike.rotation.y+=dt*3;
    h.spike.position.y=h.pos.y+1.1+Math.sin(T*5)*0.15;
    h.disc.material.opacity=0.2+Math.abs(Math.sin(T*3))*0.25;
    if(h.tick<=0&&h.mine){
      h.tick=0.85;
      forEachEnemy((e,pos)=>{
        if(pos.distanceTo(h.pos)<h.r) hurt(e,dmgOf(h.power,"Terrain",elsOf(e)),h.color);
      });
    }
    if(h.life<=0){scene.remove(h.disc);scene.remove(h.spike);hazards.splice(i,1);}
  }

  /* -- summons: orbit you, shoot the nearest enemy -- */
  for(let i=summons.length-1;i>=0;i--){
    const s=summons[i];
    s.life-=dt;s.cd-=dt;
    const a=T*2+s.phase;
    s.mesh.position.lerp(player.pos.clone().add(
      new THREE.Vector3(Math.cos(a)*2.3,2.5,Math.sin(a)*2.3)),Math.min(1,6*dt));
    s.mesh.rotation.y+=dt*4;
    if(s.cd<=0){
      let bestD=ATK.Summon.range,tgt=null,tgtE=null;
      forEachEnemy((e,pos)=>{
        if(e.kind==="npc"&&(e.ref.koT>0))return;
        const d=pos.distanceTo(s.mesh.position);
        if(d<bestD){bestD=d;tgt=pos;tgtE=e;}
      });
      if(tgt){
        s.cd=1.1;
        const dir=tgt.clone().add(new THREE.Vector3(0,1,0)).sub(s.mesh.position).normalize();
        spawnShot(s.mesh.position.clone(),dir,s.color,false);
        shots.at(-1).ghost=true;                       // tracer only; damage applied here
        hurt(tgtE,dmgOf(s.power,"Summon",elsOf(tgtE)),s.color);
      }
    }
    if(s.life<=0){scene.remove(s.mesh);summons.splice(i,1);}
  }

  stepFx(dt);

  fpsFrames++;fpsClock+=dt;
  if(fpsClock>0.5){fps=Math.round(fpsFrames/fpsClock);fpsFrames=0;fpsClock=0;}
  hudClock+=dt;
  if(hudClock>0.25){hudClock=0;drawHUD();}

  netClock+=dt;
  if(NET.on&&netClock>0.07){netClock=0;
    netSend({t:"state",name:S.name,x:player.pos.x,y:player.pos.y,z:player.pos.z,
      yaw:player.yaw,held:S.held.length,mv:player.speed>0,ofa:S.ofa,power:active().toJSON()});}

  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}

function ensureRemote(id,name,powerData){
  let r=remotes.get(id);
  if(!r){
    const pw=powerData?Power.from(powerData):rollPower();
    const char=makeChar(0xd6b58f,pw.colors[0],pw.colors[1]);
    const ring=new THREE.Mesh(new THREE.TorusGeometry(0.62,0.05,6,18),
      new THREE.MeshBasicMaterial({color:0xffffff}));
    ring.rotation.x=Math.PI/2;ring.position.y=2.15;char.group.add(ring);
    scene.add(char.group);
    r={char,ring,power:pw,name:name??"player",target:new THREE.Vector3(),yaw:0,heldN:1,beamP:0,moving:false};
    remotes.set(id,r);
  }
  if(name)r.name=name;
  if(powerData){r.power=Power.from(powerData);r.char.torso.material.color.set(r.power.colors[0]);}
  return r;
}

applyQuality();
drawHUD();
feed(`You carry ${active().name}`,"big");
feed("press P if it runs slow — cycles graphics quality");
feed("Hold E take · hold G give · C fuse two into one");
tick();
</script>
</body>
</html>
